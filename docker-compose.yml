version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twist
    ports:
      - '5433:5432'
    volumes:
      - twist_postgres_data:/var/lib/postgresql/data

volumes:
  twist_postgres_data:
